name: Build, Push and Deploy Wisecow

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/wisecow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # This job only runs if a KUBE_CONFIG secret has been added AND the
    # repository variable CD_ENABLED is set to "true" (Settings > Secrets
    # and variables > Actions > Variables). A local Minikube/Kind cluster
    # is not reachable from GitHub's runners, so CD is left disabled by
    # default; it is meant to be enabled when deploying to a real/cloud
    # cluster that IS reachable from the internet.
    if: ${{ vars.CD_ENABLED == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # KUBE_CONFIG secret should contain a base64-encoded kubeconfig
      # that has access to the target cluster (Kind/Minikube/cloud).
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set image tag in deployment
        run: |
          sed -i "s#<DOCKERHUB_USERNAME>/wisecow:latest#${{ env.IMAGE_NAME }}:${{ github.sha }}#g" k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/wisecow --timeout=120s
